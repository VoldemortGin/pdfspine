site_name: pdfspine
site_description: >-
  An Apache-2.0-licensed, pure-Rust reimplementation of PyMuPDF (fitz),
  with a Python API and an `import fitz` compatibility shim.
site_author: pdfspine contributors
repo_url: https://github.com/VoldemortGin/pdfspine
repo_name: VoldemortGin/pdfspine
edit_uri: ""

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - tables
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.snippets

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # Introspect the installed `pdfspine` wheel (in .venv). Its public
          # classes are pure-Python wrappers, so griffe reads their docstrings
          # statically; the compiled `_core` exceptions fall back to dynamic
          # collection automatically.
          options:
            docstring_style: sphinx
            docstring_section_style: table
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_if_no_docstring: true
            members_order: source
            filters:
              - "!^_"
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            heading_level: 3

nav:
  - Home: index.md
  - Guide:
      - Overview: guide/index.md
      - Installation: guide/installation.md
      - Quickstart: guide/quickstart.md
      - Text extraction: guide/text-extraction.md
      - Editing & saving: guide/editing.md
      - Rendering: guide/rendering.md
      - Command-line interface: guide/cli.md
      - Migrating from PyMuPDF: guide/migrating-from-pymupdf.md
      - License: guide/license.md
  - API reference:
      - Overview: reference/index.md
      - Documents & pages: reference/document.md
      - Text extraction: reference/textpage.md
      - Rendering: reference/pixmap.md
      - Annotations & forms: reference/annotations.md
      - Drawing & text: reference/drawing.md
      - Tables: reference/tables.md
      - Navigation: reference/navigation.md
      - Color: reference/color.md
      - Tools: reference/tools.md
      - Geometry: reference/geometry.md
      - Functions: reference/functions.md
      - Exceptions: reference/exceptions.md
      - Constants: reference/constants.md
