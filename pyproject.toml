[build-system]
requires = ["maturin>=1.12,<2"]
build-backend = "maturin"

[project]
name = "oxide-pdf"
# Keep in sync with the Rust workspace version (Cargo.toml [workspace.package]).
version = "0.0.0"
description = "Apache-2.0-licensed, pure-Rust reimplementation of PyMuPDF (fitz) with PyO3 bindings."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [{ name = "oxide-pdf contributors" }]
keywords = ["pdf", "pymupdf", "fitz", "mupdf", "rust"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Rust",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Software Development :: Libraries",
    "Topic :: Multimedia :: Graphics :: Graphics Conversion",
]

[project.urls]
Homepage = "https://github.com/VoldemortGin/oxide-pdf"
Repository = "https://github.com/VoldemortGin/oxide-pdf"
Issues = "https://github.com/VoldemortGin/oxide-pdf/issues"

[project.optional-dependencies]
test = ["pytest>=8", "hypothesis>=6"]

[project.scripts]
oxide-pdf = "oxide_pdf.cli:main"

[tool.maturin]
# The Rust crate that builds the extension module.
manifest-path = "crates/py-bindings/Cargo.toml"
# Place the compiled `_core` inside the `oxide_pdf` package.
module-name = "oxide_pdf._core"
# Pure-Python sources (oxide_pdf / fitz / pymupdf packages) live here.
python-source = "python"
# abi3 wheel covering CPython >= 3.11 (PRD §9.4 / §11.2). The 3.11 floor is
# required by `Pixmap`'s zero-copy buffer protocol — the `bf_getbuffer` /
# `bf_releasebuffer` stable-ABI slots were added in CPython 3.11.
features = ["pyo3/abi3-py311"]

[tool.pytest.ini_options]
testpaths = ["python/tests"]
