# Release workflow: builds the full abi3 wheel matrix + sdist for `pdfspine`,
# then publishes them to PyPI on a `v*` tag via PyPI Trusted Publishing (OIDC — no
# API tokens). The `pdfspine` wheel has the PaddleOCR engine compiled IN (P0-5r /
# Option A, via `[tool.maturin] features = [..., "ocr"]`) AND ships the ~28 MB
# PP-OCRv5 ONNX models inside the package (at `pdfspine/_models`, see
# `[tool.maturin] include`). So a bare `pip install pdfspine` is full-OCR-capable
# offline — no separate data package, no `[ocr]` extra needed. (The legacy
# `pdfspine-ocr-models` companion is DEPRECATED and no longer built/published.)
#
# Before uploading each platform wheel we INSTALL it into a clean env and run a
# real OCR recognition (scripts/ocr_smoke.py) as an all-platform release gate: if
# the built wheel can't recover text, that `wheels` job fails and `publish` (which
# `needs` wheels) never runs — so a broken OCR build can't ship.
#
# USER-GATED PREREQUISITE (one-time, in the PyPI web UI — see docs/RELEASE-PYPI.md):
#   PyPI -> account -> Publishing -> "Add a pending publisher" (Owner =
#   VoldemortGin, Repo = pdfspine, Workflow = release.yml, Environment = pypi):
#     Project name = pdfspine
#   (and the same on test.pypi.org with Environment = testpypi for the dry run).
#   Then create GitHub Environments `pypi` and `testpypi` (Settings -> Environments).
# Until that is done, the `publish` job will fail with "not authorized".
#
# One abi3 wheel is built per (OS, arch) — NOT one per Python version (abi3-py311
# covers CPython >= 3.11). maturin-action's containers ship the C/asm toolchain
# that the bundled `tract` OCR kernels need to compile.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish (pypi or testpypi)"
        default: "testpypi"

permissions:
  contents: read

jobs:
  wheels:
    name: wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # `ocr_native: true` = this wheel runs ON the runner's own CPU/OS, so we
        # can install it and run a REAL OCR recognition as a release gate. The
        # one omission is ubuntu-latest/aarch64: it is a manylinux CROSS build on
        # an x86 runner, so the ARM wheel can't execute here. We skip the OCR
        # run there — coverage is preserved by tract being pure-Rust and
        # platform-agnostic (no per-arch kernels to validate) over the standard
        # ai.onnx opset, exercised natively on the other three arch families; no
        # native ARM-Linux GitHub runner exists to run it on.
        include:
          - { os: ubuntu-latest, target: x86_64, manylinux: auto, ocr_native: true }
          - { os: ubuntu-latest, target: aarch64, manylinux: "2_28" } # cross build → no native OCR run
          - { os: macos-13, target: x86_64, ocr_native: true } # Intel runner
          - { os: macos-14, target: aarch64, ocr_native: true } # Apple Silicon runner
          - { os: windows-latest, target: x64, ocr_native: true }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: python scripts/set_version_from_tag.py "${{ github.ref_name }}"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --strip
          sccache: "true"
      # Release gate: install the JUST-BUILT wheel into a clean venv and run a
      # real PP-OCRv5 recognition on the in-repo sample raster (using only the
      # wheel-bundled models — exactly what `pip install pdfspine` gives a user).
      # If recognition fails, this job fails and `publish` (needs wheels) is
      # skipped → no release. Only on targets that run natively on the runner
      # (see the matrix note for why ubuntu-latest/aarch64 is excluded).
      - name: OCR smoke (install wheel + real recognition)
        if: matrix.ocr_native
        shell: bash
        run: |
          python -m venv .ocrsmoke
          if [ -f .ocrsmoke/bin/python ]; then
            PY=.ocrsmoke/bin/python
          else
            PY=.ocrsmoke/Scripts/python
          fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install --find-links dist --no-index pdfspine
          "$PY" scripts/ocr_smoke.py crates/pdf-ocr/tests/fixtures/ocr_sample.png
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: python scripts/set_version_from_tag.py "${{ github.ref_name }}"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: publish (Trusted Publishing / OIDC)
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # Tag push -> PyPI. Manual dispatch -> the chosen target (default TestPyPI).
    environment: ${{ (github.event_name == 'push' || github.event.inputs.publish_target == 'pypi') && 'pypi' || 'testpypi' }}
    permissions:
      id-token: write # REQUIRED for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target != 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
      - name: Publish to PyPI
        if: github.event_name == 'push' || github.event.inputs.publish_target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # API-token auth (the v0.1.0 release). Trusted Publishing (OIDC,
          # tokenless) is preferred for future releases — drop this `with:`
          # once pending publishers are configured on PyPI.
          password: ${{ secrets.PYPI_API_TOKEN }}
          # 跳过已存在的文件:本地手动发过 0.0.1 的 macOS-arm64 wheel + sdist,
          # 让 tag 重跑只补传缺的平台 wheel,不因重复文件而整批失败。
          skip-existing: true
