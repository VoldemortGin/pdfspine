# Release workflow: builds the full abi3 wheel matrix + sdist for `pdfspine` AND
# the pure-data `pdfspine-ocr-models` companion (sdist + universal wheel), then
# publishes both to PyPI on a `v*` tag via PyPI Trusted Publishing (OIDC — no API
# tokens). The `pdfspine` wheel has the PaddleOCR engine compiled IN (P0-5r /
# Option A, via `[tool.maturin] features = [..., "ocr"]`), but the ~16 MB ONNX
# models are NOT embedded — they ship in `pdfspine-ocr-models`, which the
# `pdfspine[ocr]` extra pulls in.
#
# USER-GATED PREREQUISITE (one-time, in the PyPI web UI — see docs/RELEASE-PYPI.md):
#   PyPI -> account -> Publishing -> "Add a pending publisher", TWICE — once per
#   project (Owner = VoldemortGin, Repo = pdfspine, Workflow = release.yml,
#   Environment = pypi):
#     Project name = pdfspine
#     Project name = pdfspine-ocr-models
#   (and the same on test.pypi.org with Environment = testpypi for the dry run).
#   Then create GitHub Environments `pypi` and `testpypi` (Settings -> Environments).
# Until that is done, the `publish` job will fail with "not authorized".
#
# One abi3 wheel is built per (OS, arch) — NOT one per Python version (abi3-py311
# covers CPython >= 3.11). maturin-action's containers ship the C/asm toolchain
# that the bundled `tract` OCR kernels need to compile.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish (pypi or testpypi)"
        default: "testpypi"

permissions:
  contents: read

jobs:
  wheels:
    name: wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64, manylinux: auto }
          - { os: ubuntu-latest, target: aarch64, manylinux: "2_28" }
          - { os: macos-13, target: x86_64 } # Intel runner
          - { os: macos-14, target: aarch64 } # Apple Silicon runner
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: python scripts/set_version_from_tag.py "${{ github.ref_name }}"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --strip
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: python scripts/set_version_from_tag.py "${{ github.ref_name }}"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  ocr-models:
    name: ocr-models (data sdist + universal wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Stamp the companion's version from the tag so it tracks the `pdfspine`
      # release it ships alongside. Dev builds leave it at the 0.0.0 default.
      - name: Set companion version from tag
        if: github.ref_type == 'tag'
        run: |
          python - "${{ github.ref_name }}" <<'PY'
          import re, sys
          from pathlib import Path
          version = sys.argv[1].lstrip("v").strip()
          p = Path("packages/pdfspine-ocr-models/pyproject.toml")
          text = p.read_text(encoding="utf-8")
          text, n = re.subn(r'(?m)^version = "[^"]*"', f'version = "{version}"', text, count=1)
          assert n == 1, "could not find version line in companion pyproject.toml"
          p.write_text(text, encoding="utf-8")
          print(f"set pdfspine-ocr-models version to {version}")
          PY
      - name: Build pure-data sdist + universal wheel
        # The build hook force-includes the 3 ONNX from crates/pdf-ocr/models
        # (the in-repo single source of truth) into both artifacts.
        run: |
          python -m pip install --upgrade build
          python -m build packages/pdfspine-ocr-models --outdir dist
      - uses: actions/upload-artifact@v4
        with:
          name: ocr-models
          path: |
            dist/*.whl
            dist/*.tar.gz

  publish:
    name: publish (Trusted Publishing / OIDC)
    needs: [wheels, sdist, ocr-models]
    runs-on: ubuntu-latest
    # Tag push -> PyPI. Manual dispatch -> the chosen target (default TestPyPI).
    environment: ${{ (github.event_name == 'push' || github.event.inputs.publish_target == 'pypi') && 'pypi' || 'testpypi' }}
    permissions:
      id-token: write # REQUIRED for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target != 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
      - name: Publish to PyPI
        if: github.event_name == 'push' || github.event.inputs.publish_target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # API-token auth (the v0.1.0 release). Trusted Publishing (OIDC,
          # tokenless) is preferred for future releases — drop this `with:`
          # once pending publishers are configured on PyPI.
          password: ${{ secrets.PYPI_API_TOKEN }}
          # 跳过已存在的文件:本地手动发过 0.0.1 的 macOS-arm64 wheel + sdist,
          # 让 tag 重跑只补传缺的平台 wheel,不因重复文件而整批失败。
          skip-existing: true
