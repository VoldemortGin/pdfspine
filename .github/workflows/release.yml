# Release workflow: builds the full abi3 wheel matrix + sdist and publishes to
# PyPI on a `v*` tag, via PyPI Trusted Publishing (OIDC — no API tokens).
#
# USER-GATED PREREQUISITE (one-time, in the PyPI web UI — see docs/RELEASE-PYPI.md):
#   PyPI -> account -> Publishing -> "Add a pending publisher":
#     Project name = pdfspine, Owner = VoldemortGin, Repo = pdfspine,
#     Workflow = release.yml, Environment = pypi
#   (and the same on test.pypi.org with Environment = testpypi for the dry run).
#   Then create GitHub Environments `pypi` and `testpypi` (Settings -> Environments).
# Until that is done, the `publish` job will fail with "not authorized".
#
# One abi3 wheel is built per (OS, arch) — NOT one per Python version (abi3-py311
# covers CPython >= 3.11). maturin-action's containers ship the C/asm toolchain
# that the bundled `tract` OCR kernels need to compile.

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Where to publish (pypi or testpypi)"
        default: "testpypi"

permissions:
  contents: read

jobs:
  wheels:
    name: wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64, manylinux: auto }
          - { os: ubuntu-latest, target: aarch64, manylinux: "2_28" }
          - { os: macos-13, target: x86_64 } # Intel runner
          - { os: macos-14, target: aarch64 } # Apple Silicon runner
          - { os: windows-latest, target: x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: python scripts/set_version_from_tag.py "${{ github.ref_name }}"
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --strip
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from tag
        if: github.ref_type == 'tag'
        run: python scripts/set_version_from_tag.py "${{ github.ref_name }}"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: publish (Trusted Publishing / OIDC)
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    # Tag push -> PyPI. Manual dispatch -> the chosen target (default TestPyPI).
    environment: ${{ (github.event_name == 'push' || github.event.inputs.publish_target == 'pypi') && 'pypi' || 'testpypi' }}
    permissions:
      id-token: write # REQUIRED for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target != 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
      - name: Publish to PyPI
        if: github.event_name == 'push' || github.event.inputs.publish_target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
