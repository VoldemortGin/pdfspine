# COMPAT.toml — oxide-pdf ↔ PyMuPDF compatibility map
#
# WHAT THIS IS
#   The machine-readable disposition matrix for every public symbol in the
#   pinned PyMuPDF baseline (PRD §7 / §9.5). Every PyMuPDF symbol not present
#   here is out-of-scope by default and must raise PdfUnsupportedError (never
#   AttributeError). The compat-symbol-guard fails CI if any baseline symbol
#   (compat/compat-baseline.txt) is missing an entry below — forcing an
#   explicit disposition for any newly-surfaced API (baseline evolution, §17.2).
#
#   Pinned baseline: PyMuPDF 1.24.x (1.24.14 / MuPDF 1.24.11).
#
# FORMAT
#   [[symbol]]
#   name        = "Class.member" | "Class" | "module_level_name"
#   group       = owning class / section (for grouping)
#   disposition = "implemented" | "deferred" | "out-of-scope"
#   milestone   = "M0".."M6" | "post-v1" | "out-of-scope" (optional)
#   note        = short rationale (optional)
#
#   disposition meanings:
#     implemented  — present in python/ and does NOT raise PdfUnsupportedError
#     deferred     — known, planned for a later milestone (M3–M6 / post-v1)
#     out-of-scope — intentionally never in v1; raises PdfUnsupportedError
#
# Generated from scripts/_compat_catalog.py — regenerate, do not hand-edit.

